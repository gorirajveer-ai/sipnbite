<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Helpdesk</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; line-height: 1.6; color: #333; overflow-x: hidden; }

        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; padding: 1.5rem 2rem; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #ff6b6b, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .hero { height: 40vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23f8d7da" width="1200" height="800"/><circle fill="%23ff6b6b" opacity="0.1" cx="200" cy="200" r="150"/><circle fill="%234ecdc4" opacity="0.1" cx="1000" cy="300" r="120"/></svg>'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero-content h1 { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; }

        .section { padding: 60px 2rem; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; background: linear-gradient(135deg, #ff6b6b, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #ff6b6b; }

        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff6b6b, #4ecdc4); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .footer { background: #333; color: white; text-align: center; padding: 2rem; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="logo">HELP<span>DESK</span></div>
    </div>

    <header class="hero">
        <div class="hero-content">
            <h1>How can we Help?</h1>
            <p>Submit a ticket and our team will get back to you shortly.</p>
        </div>
    </header>

    <section id="submit-section" class="section">
        <h2 class="section-title">Submit a Ticket</h2>
        <div class="form-container">
            <form id="helpdeskForm">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="issueType">Issue Category</label>
                    <select id="issueType">
                        <option value="technical">Technical Support</option>
                        <option value="billing">Billing Inquiry</option>
                        <option value="feedback">General Feedback</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Description of Issue</label>
                    <textarea id="message" rows="5" placeholder="Tell us more about your problem..." required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">Submit Ticket</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; Built and designed by RAJVEER BHANUSHALI</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBRM5WfWQg1RFZEtSqDayj6dBlLxUDcJ-w",
            authDomain: "sipnbites-feedback.firebaseapp.com",
            databaseURL: "https://sipnbites-feedback-default-rtdb.firebaseio.com",
            projectId: "sipnbites-feedback",
            storageBucket: "sipnbites-feedback.firebasestorage.app",
            messagingSenderId: "829166652773",
            appId: "1:829166652773:web:cb775dadfa87d075a2a58c",
            measurementId: "G-Z1W4EXBCVQ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const helpdeskForm = document.getElementById('helpdeskForm');
        const submitBtn = document.getElementById('submitBtn');

        helpdeskForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Disable button to prevent double submission
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";

            // Create Ticket Data
            const ticketData = {
                ticketId: '#' + Math.floor(Math.random() * 90000 + 10000),
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                category: document.getElementById('issueType').value,
                message: document.getElementById('message').value,
                submittedAt: new Date().toISOString()
            };

            // Reference to 'tickets' node in Firebase
            const ticketsRef = ref(database, 'support_tickets');
            const newTicketRef = push(ticketsRef);

            // Save to Firebase
            set(newTicketRef, ticketData)
                .then(() => {
                    alert('Ticket Submitted Successfully! Your Ticket ID is: ' + ticketData.ticketId);
                    helpdeskForm.reset();
                })
                .catch((error) => {
                    console.error("Firebase Error: ", error);
                    alert('Error submitting ticket. Please try again later.');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Ticket";
                });
        });
    </script>
</body>
</html>
